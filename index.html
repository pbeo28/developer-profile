<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livre - Book Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            color: #2c2c2c;
            background: #fafaf7;
            padding: 2rem 1.5rem;
            max-width: 720px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 { font-size: 2rem; margin-bottom: 0.25rem; color: #1a1a1a; }
        .subtitle { color: #666; font-size: 1rem; margin-bottom: 2rem; }
        p { margin-bottom: 0.75rem; font-size: 0.95rem; }
        a { color: #4a6fa5; }
        .links { margin-top: 1.5rem; }
        .links a {
            display: inline-block;
            margin-right: 1.5rem;
            font-size: 0.95rem;
        }
        hr { border: none; border-top: 1px solid #e0ddd5; margin: 2rem 0; }
        .contact { font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>
    <div>
        <h1>Livre</h1>
        <p class="subtitle">A modern book reader for Android and iOS.</p>
        <p>Read EPUB, PDF, CBZ, MOBI, FB2, and more. Beautiful typography, deep customization, and a reading-first experience.</p>
        <div class="links">
            <a href="https://pbeo28.github.io/livre-policy/">Privacy Policy</a>
            <a href="mailto:contact@cube.al">Contact</a>
        </div>
        <hr>
        <p class="contact">&copy; 2026 Cube AL</p>
    </div>
</body>
</html>
